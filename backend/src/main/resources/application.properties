server.port=8080
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:./data/stratvis.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON

openai.model=gpt-5.4-mini
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.key=${OPENAI_API_KEY:}
feedback.log.file=/var/log/stratvis/feedback.log
auth.token.ttl.seconds=${AUTH_TOKEN_TTL_SECONDS:2592000}
